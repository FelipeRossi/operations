<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Operaciones — COVISA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Calibri',Candara,Segoe,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #21262d;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{color:#58a6ff;font-size:32px}
.brand-name{font-size:28px;font-weight:700;color:#58a6ff}
.brand-sub{font-size:18px;color:#8b949e;margin-left:12px;font-weight:500}
.week-ctl{display:flex;align-items:center;gap:12px}
.week-ctl span{font-size:18px;color:#8b949e;font-weight:600}
.week-ctl select{font-size:18px;padding:8px 14px;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:8px;outline:none;font-weight:600;font-family:'Calibri',Candara,Segoe,sans-serif}
.sum-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:#21262d;border-bottom:1px solid #21262d}
.sk{background:#161b22;padding:26px 28px;border-left:4px solid transparent}
.sk-lbl{font-size:16px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b949e;margin-bottom:10px}
.sk-num{font-size:52px;font-weight:700;line-height:1;margin-bottom:6px}
.sk-sub{font-size:16px;font-weight:500;color:#8b949e}
.sk-prog{height:4px;background:#21262d;border-radius:2px;margin-top:16px}
.sk-fill{height:4px;border-radius:2px}
.sk-green{border-left-color:#3fb950}.sk-green .sk-num{color:#3fb950}.sk-green .sk-fill{background:#3fb950}
.sk-red{border-left-color:#f85149}.sk-red .sk-num{color:#f85149}.sk-red .sk-fill{background:#f85149}
.sk-blue{border-left-color:#58a6ff}.sk-blue .sk-num{color:#58a6ff}.sk-blue .sk-fill{background:#58a6ff}
.sk-amber{border-left-color:#d29922}.sk-amber .sk-num{color:#d29922}.sk-amber .sk-fill{background:#d29922}
.body{padding:16px 24px 40px;display:flex;flex-direction:column;gap:14px}
.area-block{background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden}
.area-head{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid #21262d}
.area-icon{font-size:26px}
.area-title{font-size:24px;font-weight:700;color:#e6edf3}
.area-counts{margin-left:auto;display:flex;gap:8px;align-items:center}
.cnt{font-size:16px;padding:5px 14px;border-radius:20px;font-weight:700}
.cnt-g{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.cnt-r{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.loading{text-align:center;padding:60px;font-size:20px;color:#8b949e}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:16px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b949e;padding:14px 22px;text-align:left;background:#0d1117;border-bottom:1px solid #21262d;font-family:'Calibri',Candara,Segoe,sans-serif}
th.r{text-align:right}th.c{text-align:center}
td{font-size:18px;padding:16px 22px;border-bottom:1px solid #1c2128;vertical-align:middle;font-family:'Calibri',Candara,Segoe,sans-serif}
td.r{text-align:right}td.c{text-align:center}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1c2128}
.ind-name{color:#cdd9e5;font-size:18px;font-weight:600}
.val-obj{color:#8b949e;font-size:17px;font-weight:600}
.val-real{color:#e6edf3;font-size:20px;font-weight:700}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:6px 18px;border-radius:24px;font-size:17px;font-weight:700;min-width:80px;font-family:'Calibri',Candara,Segoe,sans-serif}
.pg{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.pr{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.pn{background:rgba(139,148,158,.1);color:#8b949e;border:1px solid rgba(139,148,158,.2)}
.spark{display:inline-flex;align-items:flex-end;gap:4px;height:30px}
.sb{width:12px;border-radius:3px 3px 0 0}
.na-val{color:#4a5568;font-size:16px}
.area-prod .area-head{border-left:4px solid #58a6ff}
.area-qa   .area-head{border-left:4px solid #3fb950}
.area-maint .area-head{border-left:4px solid #d29922}
.area-sc   .area-head{border-left:4px solid #bc8cff}
.area-pa   .area-head{border-left:4px solid #58a6ff}
.area-stk  .area-head{border-left:4px solid #d29922}
.cod{font-family:monospace;font-size:15px;color:#8b949e}
.refresh-btn{font-size:14px;padding:6px 14px;background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.3);border-radius:6px;cursor:pointer;font-family:'Calibri',sans-serif;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <i class="ti ti-chart-dots brand-icon"></i>
    <span class="brand-name">Dashboard de operaciones</span>
    <span class="brand-sub">COVISA — Conductores Eléctricos</span>
  </div>
  <div class="week-ctl">
    <button class="refresh-btn" onclick="cargarDatos()"><i class="ti ti-refresh"></i> Actualizar</button>
    <i class="ti ti-calendar" style="font-size:22px;color:#8b949e"></i>
    <span>Semana</span>
    <select id="wsel" onchange="render()"></select>
  </div>
</div>

<div class="sum-grid" id="sum-grid"><div class="sk" style="grid-column:span 4"><div class="loading"><i class="ti ti-loader"></i> Cargando datos...</div></div></div>
<div class="body" id="body"></div>

<script>
const BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vQpFXy4kVUlibdPapu1GjtPzussc94aSBHaLp59_D4E3zQ7T2PhwOPH-Laep7On7x8nx3tWGpjud6TW/pub?single=true&output=csv&gid=';
const URL_DATA  =BASE+'816074203';
const URL_PLANES=BASE+'526759942';
const URL_STOCK =BASE+'1914223095';

const PCTS=['dis','scm','sce','ecr','ecrclp','ern','ernclp','qmp'];
const ACFG={
  PROD: {label:'Producción',    icon:'ti-bolt',         color:'#58a6ff',cls:'area-prod'},
  QA:   {label:'Calidad',       icon:'ti-shield-check', color:'#3fb950',cls:'area-qa'},
  MAINT:{label:'Mantenimiento', icon:'ti-tool',         color:'#d29922',cls:'area-maint'},
  SC:   {label:'Supply chain',  icon:'ti-package',      color:'#bc8cff',cls:'area-sc'},
};

let WK=[], IND=[], PLANES=[], STOCK=[];

async function fetchCSV(url){
  const r=await fetch(url);
  const t=await r.text();
  return t.trim().split('\n').map(row=>row.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
}

function parseNum(v){
  if(!v||v==='-'||v==='')return null;
  return parseFloat(v.replace('%','').replace(',','.'));
}

async function cargarDatos(){
  document.getElementById('sum-grid').innerHTML='<div class="sk" style="grid-column:span 4"><div class="loading"><i class="ti ti-loader"></i> Cargando datos...</div></div>';
  document.getElementById('body').innerHTML='';

  try{
    const [dataRows, planesRows, stockRows] = await Promise.all([
      fetchCSV(URL_DATA), fetchCSV(URL_PLANES), fetchCSV(URL_STOCK)
    ]);

    // Parsear DATA
    const headers=dataRows[0];
    WK=headers.slice(5);
    IND=[];
    for(let i=1;i<dataRows.length;i++){
      const row=dataRows[i];
      if(!row[0])continue;
      const id=row[0].toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,10);
      const objFijo=parseNum(row[4]);
      const real=row.slice(5).map(v=>parseNum(v));
      // detectar si es fila OBJ o Real para variables
      const isOBJ=row[0].includes('OBJ');
      const isReal=row[0].includes('Real');
      if(isOBJ){
        IND.push({id:id+'obj',label:row[0],area:row[1],logica:row[3],objFijo:null,obj:real,real:[],isObjRow:true});
      } else {
        // buscar fila OBJ correspondiente
        const labelBase=row[0].replace(' Real','').replace(' OBJ','');
        const objRow=IND.find(x=>x.isObjRow && x.label.replace(' OBJ','')===labelBase);
        IND.push({id,label:row[0].replace(' Real',''),area:row[1],logica:row[3],objFijo,obj:objRow?objRow.obj:null,real,isObjRow:false});
      }
    }
    IND=IND.filter(x=>!x.isObjRow);

    // Parsear PLANES
    PLANES=[];
    for(let i=1;i<planesRows.length;i++){
      const r=planesRows[i];
      if(!r[0])continue;
      PLANES.push({desc:r[0],resp:r[1]||'—',inicio:r[2]||'—',revision:r[3]||'—'});
    }

    // Parsear STOCK
    STOCK=[];
    for(let i=1;i<stockRows.length;i++){
      const r=stockRows[i];
      if(!r[0])continue;
      STOCK.push({cod:r[0],desc:r[1],stock:parseNum(r[2]),ds:parseNum(r[3]),ss:parseNum(r[4]),q:parseNum(r[5]),com:r[6]||''});
    }

    // Poblar selector de semanas
    const sel=document.getElementById('wsel');
    sel.innerHTML='';
    WK.forEach((w,i)=>{
      const o=document.createElement('option');
      o.value=i; o.textContent=w;
      sel.appendChild(o);
    });
    sel.value=WK.length-1;
    render();

  }catch(e){
    document.getElementById('sum-grid').innerHTML=`<div class="sk" style="grid-column:span 4"><div class="loading" style="color:#f85149"><i class="ti ti-alert-triangle"></i> Error al cargar datos: ${e.message}</div></div>`;
  }
}

function getObj(ind,wi){
  if(ind.objFijo!==null&&ind.objFijo!==undefined) return ind.objFijo;
  return ind.obj ? ind.obj[wi] : null;
}

function getSt(ind,wi){
  const r=ind.real[wi], o=getObj(ind,wi);
  if(r==null||o==null) return 'na';
  return ind.logica==='mayor'?(r>=o?'g':'r'):(r<=o?'g':'r');
}

function getFF(ind,wi){
  const r=ind.real[wi], o=getObj(ind,wi);
  if(r==null||o==null) return null;
  if(ind.logica==='mayor') return o!==0?Math.round(r/o*100):100;
  if(r===0) return 100;
  return Math.round(o/r*100);
}

function fmt(v,ind){
  if(v==null) return '<span class="na-val">N/A</span>';
  const n=Number.isInteger(v)?v:parseFloat(v.toFixed(2));
  return PCTS.includes(ind.id)?n+'%':String(n);
}

function spk(ind,wi){
  const vals=ind.real.filter(x=>x!=null);
  if(!vals.length) return '';
  const mx=Math.max(...vals.map(Math.abs));
  let b='';
  for(let i=Math.max(0,wi-4);i<=wi;i++){
    const v=ind.real[i],st=getSt(ind,i);
    const col=st==='g'?'#3fb950':st==='r'?'#f85149':'#30363d';
    const h=v==null?4:Math.max(6,Math.round(Math.abs(v)/Math.max(mx,1)*28));
    b+=`<div class="sb" style="height:${h}px;background:${col}"></div>`;
  }
  return `<span class="spark">${b}</span>`;
}

function pillH(st,ff){
  if(st==='na') return '<span class="pill pn">N/A</span>';
  return `<span class="pill p${st}">${ff}%</span>`;
}

function fmtFecha(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}-${m}-${y}`;}

function agregarPlan(){
  const desc=document.getElementById('pa-desc').value.trim();
  const resp=document.getElementById('pa-resp').value.trim();
  const ini=document.getElementById('pa-ini').value;
  const rev=document.getElementById('pa-rev').value;
  if(!desc){document.getElementById('pa-desc').style.border='1px solid #f85149';return;}
  document.getElementById('pa-desc').style.border='1px solid #30363d';
  PLANES.push({desc,resp:resp||'—',inicio:fmtFecha(ini)||'—',revision:fmtFecha(rev)||'—'});
  ['pa-desc','pa-resp','pa-ini','pa-rev'].forEach(id=>document.getElementById(id).value='');
  render();
}

function eliminarPlan(idx){PLANES.splice(idx,1);render();}

function render(){
  const wi=parseInt(document.getElementById('wsel').value);
  const measured=IND.filter(i=>getSt(i,wi)!=='na');
  const verde=measured.filter(i=>getSt(i,wi)==='g').length;
  const rojo=measured.filter(i=>getSt(i,wi)==='r').length;
  const pct=measured.length?Math.round(verde/measured.length*100):0;
  const qA=STOCK.filter(s=>s.q>0).length;

  document.getElementById('sum-grid').innerHTML=`
    <div class="sk sk-green">
      <div class="sk-lbl"><i class="ti ti-circle-check" style="font-size:18px;margin-right:6px"></i>Cumpliendo</div>
      <div class="sk-num">${verde}</div>
      <div class="sk-sub">de ${measured.length} indicadores medidos</div>
      <div class="sk-prog"><div class="sk-fill" style="width:${Math.round(verde/Math.max(measured.length,1)*100)}%"></div></div>
    </div>
    <div class="sk sk-red">
      <div class="sk-lbl"><i class="ti ti-circle-x" style="font-size:18px;margin-right:6px"></i>Con desvío</div>
      <div class="sk-num">${rojo}</div>
      <div class="sk-sub">de ${measured.length} indicadores medidos</div>
      <div class="sk-prog"><div class="sk-fill" style="width:${Math.round(rojo/Math.max(measured.length,1)*100)}%"></div></div>
    </div>
    <div class="sk sk-blue">
      <div class="sk-lbl"><i class="ti ti-percentage" style="font-size:18px;margin-right:6px"></i>Cumplimiento global</div>
      <div class="sk-num">${pct}%</div>
      <div class="sk-sub">${WK[wi]}</div>
      <div class="sk-prog"><div class="sk-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sk sk-amber">
      <div class="sk-lbl"><i class="ti ti-alert-triangle" style="font-size:18px;margin-right:6px"></i>Quiebres MP activos</div>
      <div class="sk-num">${qA}</div>
      <div class="sk-sub">ítems bajo stock de seguridad</div>
      <div class="sk-prog"><div class="sk-fill" style="width:${Math.round(qA/Math.max(STOCK.length,1)*100)}%"></div></div>
    </div>`;

  let html='';

  for(const area of ['PROD','QA','MAINT','SC']){
    const cfg=ACFG[area];
    const rows=IND.filter(r=>r.area===area);
    const av=rows.filter(r=>getSt(r,wi)==='g').length;
    const ar=rows.filter(r=>getSt(r,wi)==='r').length;
    html+=`<div class="area-block ${cfg.cls}">
      <div class="area-head">
        <i class="ti ${cfg.icon} area-icon" style="color:${cfg.color}"></i>
        <span class="area-title">${cfg.label}</span>
        <div class="area-counts">
          <span class="cnt cnt-g">${av} ✓</span>
          <span class="cnt cnt-r">${ar} ✗</span>
        </div>
      </div>
      <table><thead><tr>
        <th style="width:38%">Indicador</th>
        <th class="r" style="width:13%">Objetivo</th>
        <th class="r" style="width:13%">Real</th>
        <th class="c" style="width:18%">Cumplimiento</th>
        <th class="c" style="width:18%">Tendencia</th>
      </tr></thead><tbody>`;
    for(const ind of rows){
      const st=getSt(ind,wi),ff=getFF(ind,wi);
      html+=`<tr>
        <td><span class="ind-name">${ind.label}</span></td>
        <td class="r"><span class="val-obj">${fmt(getObj(ind,wi),ind)}</span></td>
        <td class="r"><span class="val-real">${fmt(ind.real[wi],ind)}</span></td>
        <td class="c">${pillH(st,ff)}</td>
        <td class="c">${spk(ind,wi)}</td>
      </tr>`;
    }
    html+=`</tbody></table></div>`;
  }

  // Planes de acción
  html+=`<div class="area-block area-pa">
    <div class="area-head">
      <i class="ti ti-clipboard-list area-icon" style="color:#58a6ff"></i>
      <span class="area-title">Planes de acción</span>
      <div class="area-counts">
        <span class="cnt" style="background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.25)">${PLANES.length} activo${PLANES.length!==1?'s':''}</span>
      </div>
    </div>
    <table><thead><tr>
      <th style="width:46%">Planes de acción</th>
      <th style="width:14%">Responsable</th>
      <th style="width:14%">Inicio</th>
      <th style="width:14%">Revisión</th>
      <th style="width:12%"></th>
    </tr></thead><tbody>`;
  PLANES.forEach((p,idx)=>{
    html+=`<tr>
      <td style="font-size:17px;color:#cdd9e5;font-weight:500">${p.desc}</td>
      <td style="font-size:17px;color:#8b949e;font-weight:600">${p.resp}</td>
      <td style="font-size:17px;color:#8b949e;font-weight:600">${p.inicio}</td>
      <td style="font-size:17px;color:#8b949e;font-weight:600">${p.revision}</td>
      <td class="c"><button onclick="eliminarPlan(${idx})" style="font-size:15px;padding:5px 12px;background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.3);border-radius:6px;cursor:pointer;font-family:'Calibri',sans-serif"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  });
  html+=`</tbody></table>
    <div style="padding:18px 22px;border-top:1px solid #21262d;display:grid;grid-template-columns:3fr 1fr 1fr 1fr auto;gap:10px;align-items:end">
      <div>
        <div style="font-size:13px;color:#8b949e;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Descripción</div>
        <input id="pa-desc" type="text" placeholder="Descripción del plan..." style="width:100%;font-size:16px;padding:8px 12px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:7px;outline:none;font-family:'Calibri',sans-serif">
      </div>
      <div>
        <div style="font-size:13px;color:#8b949e;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Responsable</div>
        <input id="pa-resp" type="text" placeholder="Ej: WOP-EVL" style="width:100%;font-size:16px;padding:8px 12px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:7px;outline:none;font-family:'Calibri',sans-serif">
      </div>
      <div>
        <div style="font-size:13px;color:#8b949e;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Inicio</div>
        <input id="pa-ini" type="date" style="width:100%;font-size:16px;padding:8px 12px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:7px;outline:none;font-family:'Calibri',sans-serif">
      </div>
      <div>
        <div style="font-size:13px;color:#8b949e;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Revisión</div>
        <input id="pa-rev" type="date" style="width:100%;font-size:16px;padding:8px 12px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:7px;outline:none;font-family:'Calibri',sans-serif">
      </div>
      <button onclick="agregarPlan()" style="font-size:16px;font-weight:700;padding:9px 18px;background:#58a6ff;color:#0d1117;border:none;border-radius:7px;cursor:pointer;font-family:'Calibri',sans-serif;white-space:nowrap"><i class="ti ti-plus" style="margin-right:4px"></i>Agregar</button>
    </div>
  </div>`;

  // Stock
  html+=`<div class="area-block area-stk">
    <div class="area-head">
      <i class="ti ti-box area-icon" style="color:#d29922"></i>
      <span class="area-title">Quiebres de stock MP</span>
      <div class="area-counts"><span class="cnt cnt-r">${qA} activos</span></div>
    </div>
    <table><thead><tr>
      <th style="width:10%">Código</th>
      <th style="width:22%">Descripción</th>
      <th class="r" style="width:9%">Stock</th>
      <th class="r" style="width:10%">Desv.Est.</th>
      <th class="r" style="width:9%">SS</th>
      <th class="c" style="width:10%">Quiebre</th>
      <th style="width:30%">Comentario</th>
    </tr></thead><tbody>`;
  for(const s of STOCK){
    const qb=s.q>0?`<span class="pill pr" style="min-width:48px">${s.q}</span>`:`<span class="pill pg" style="min-width:48px">0</span>`;
    html+=`<tr>
      <td><span class="cod">${s.cod}</span></td>
      <td style="font-size:17px;color:#cdd9e5;font-weight:500">${s.desc}</td>
      <td class="r" style="font-size:17px;color:#8b949e;font-weight:600">${s.stock!=null?s.stock.toFixed(2):'—'}</td>
      <td class="r" style="font-size:17px;color:#8b949e;font-weight:600">${s.ds!=null?s.ds.toFixed(2):'—'}</td>
      <td class="r" style="font-size:17px;color:#8b949e;font-weight:600">${s.ss!=null?s.ss.toFixed(2):'—'}</td>
      <td class="c">${qb}</td>
      <td style="font-size:16px;color:#8b949e">${s.com}</td>
    </tr>`;
  }
  html+=`</tbody></table></div>`;
  document.getElementById('body').innerHTML=html;
}

cargarDatos();
</script>
</body>
</html>
